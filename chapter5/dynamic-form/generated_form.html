<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机票预订表单</title>
    <style>
        #return_date_field {
            display: none;
        }
    </style>
</head>
<body>
    <h1>机票预订表单</h1>
    <form id="flightForm">
        <label for="departure_city">出发城市:</label>
        <input type="text" id="departure_city" name="departure_city" required><br><br>

        <label for="departure_date">出发日期:</label>
        <input type="date" id="departure_date" name="departure_date" required><br><br>

        <label>旅行类型:</label><br>
        <input type="radio" id="one_way" name="trip_type" value="one_way" required>
        <label for="one_way">单程</label><br>
        <input type="radio" id="round_trip" name="trip_type" value="round_trip" required>
        <label for="round_trip">往返</label><br><br>

        <div id="return_date_field">
            <label for="return_date">返程日期:</label>
            <input type="date" id="return_date" name="return_date"><br><br>
        </div>

        <button type="submit">提交</button>
    </form>

    <h2>结果:</h2>
    <pre id="result"></pre>

    <script>
        const tripTypeRadios = document.querySelectorAll('input[name="trip_type"]');
        const returnDateField = document.getElementById('return_date_field');

        tripTypeRadios.forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.value === 'round_trip') {
                    returnDateField.style.display = 'block';
                } else {
                    returnDateField.style.display = 'none';
                }
            });
        });

        document.getElementById('flightForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(this);
            const jsonObject = {};
            formData.forEach((value, key) => {
                jsonObject[key] = value;
            });
            document.getElementById('result').textContent = JSON.stringify(jsonObject, null, 2);
        });
    </script>
</body>
</html>
